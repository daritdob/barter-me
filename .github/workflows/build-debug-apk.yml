name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ORG_GRADLE_PROJECT_org.gradle.configuration-cache: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Run unit tests
        run: chmod +x gradlew && ./gradlew testDebugUnitTest --no-daemon --stacktrace --info 2>&1 | tee unit-test.log; if [ $? -ne 0 ]; then tail -n 80 unit-test.log; exit 1; fi

      - name: Upload unit test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log
          retention-days: 7

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: barter-me-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Job summary
        run: |
          APK_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "## Barter-me debug APK" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Size:** ${APK_SIZE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Package:** \`com.aistudio.barter.xyzwvk\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the APK from the **Artifacts** section on this workflow run, then install it on your Android phone." >> "$GITHUB_STEP_SUMMARY"
